<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Endpoint Forge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        /* Custom scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.3);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.5);
        }
        .glowing-button {
            position: relative;
            overflow: hidden;
        }
        .glowing-button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(139, 92, 246, 0.2),
                transparent
            );
            transform: rotate(45deg);
            transition: 0.5s;
            opacity: 0;
        }
        .glowing-button:hover::after {
            opacity: 1;
            left: 120%;
        }
    </style>
</head>
<body class="bg-[#0b0f19] text-slate-100 min-h-screen flex flex-col p-4 md:p-8 bg-radial-gradient">
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-indigo-900/20 via-slate-950 to-[#0b0f19] -z-10"></div>
    
    <div class="max-w-5xl mx-auto w-full flex-grow flex flex-col justify-start">
        
        <!-- Header -->
        <header class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between border-b border-slate-800/60 pb-6 gap-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-tr from-violet-600 to-indigo-600 flex items-center justify-center shadow-lg shadow-violet-500/20 ring-1 ring-violet-400/30">
                    <span class="text-2xl animate-pulse">🔥</span>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-violet-400 via-indigo-200 to-cyan-300 bg-clip-text text-transparent">
                        The Endpoint Forge
                    </h1>
                    <p class="text-xs text-slate-400 mt-0.5">
                        Breathe life into your data schemas and materialize them as API endpoints
                    </p>
                </div>
            </div>
            <div class="flex items-center gap-2 bg-slate-900/60 px-3.5 py-1.5 rounded-lg border border-slate-800/80">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span>
                <span class="text-xs text-slate-300 font-medium tracking-wide">FORGE ACTIVE</span>
            </div>
        </header>

        <!-- Main Layout Split -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <!-- Left Panel: Discovered Nodes & Blueprint Selector (7 cols) -->
            <div class="lg:col-span-7 space-y-6">
                
                <!-- Step 1: Scan Realm -->
                <section class="bg-slate-950/65 backdrop-blur-md p-5 rounded-2xl border border-slate-800/80 shadow-xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-24 h-24 bg-violet-600/5 rounded-full blur-2xl"></div>
                    <div class="flex items-center gap-2.5 mb-4">
                        <div class="w-6 h-6 rounded-md bg-violet-500/10 flex items-center justify-center text-xs font-semibold text-violet-400">1</div>
                        <h2 class="text-sm font-semibold tracking-wide text-slate-200">ACTIVE API NODES PRESENT</h2>
                    </div>
                    <div id="folders-list-container" class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-48 overflow-y-auto pr-1">
                        <!-- Filled dynamically by forgeController -->
                    </div>
                </section>

                <!-- Step 2: Select Blueprint -->
                <section class="bg-slate-950/65 backdrop-blur-md p-5 rounded-2xl border border-slate-800/80 shadow-xl relative">
                    <div class="flex items-center gap-2.5 mb-4">
                        <div class="w-6 h-6 rounded-md bg-violet-500/10 flex items-center justify-center text-xs font-semibold text-violet-400">2</div>
                        <h2 class="text-sm font-semibold tracking-wide text-slate-200">CHOOSE DATABASE BLUEPRINT SCHEMA</h2>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                        <!-- Left inside: Schema List (5 cols) -->
                        <div class="md:col-span-5 space-y-2 max-h-60 overflow-y-auto pr-1" id="schemas-list-container">
                            <!-- Filled dynamically by forgeController -->
                        </div>

                        <!-- Right inside: Blueprint Preview (7 cols) -->
                        <div class="md:col-span-7">
                            <div id="blueprint-preview-container" class="hidden h-full flex flex-col justify-between p-4 rounded-xl bg-slate-900/30 border border-slate-800/80">
                                <div class="space-y-3">
                                    <div class="flex items-center justify-between">
                                        <span class="text-xs font-semibold text-slate-400 tracking-wider">BLUEPRINT MAP</span>
                                        <span id="blueprint-columns-count" class="text-[10px] text-violet-400 font-mono bg-violet-500/10 px-2 py-0.5 rounded border border-violet-500/20">0 fields</span>
                                    </div>
                                    <h3 id="blueprint-title" class="text-sm font-bold text-slate-200 font-mono">Table</h3>
                                    <div id="blueprint-columns-list" class="flex flex-wrap gap-1.5 max-h-32 overflow-y-auto pt-1">
                                        <!-- Filled dynamically by forgeController -->
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                
            </div>

            <!-- Right Panel: Forge Console & Execution (5 cols) -->
            <div class="lg:col-span-5 space-y-6">
                
                <!-- Destination Name Input -->
                <section class="bg-slate-950/65 backdrop-blur-md p-5 rounded-2xl border border-slate-800/80 shadow-xl relative">
                    <div class="flex items-center gap-2.5 mb-4">
                        <div class="w-6 h-6 rounded-md bg-violet-500/10 flex items-center justify-center text-xs font-semibold text-violet-400">3</div>
                        <h2 class="text-sm font-semibold tracking-wide text-slate-200">DESTINATION TARGET</h2>
                    </div>
                    
                    <div class="space-y-2">
                        <label for="folder-name" class="block text-xs font-medium text-slate-400">
                            Target folder name for endpoints
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                                📁
                            </div>
                            <input type="text" id="folder-name" 
                                class="block w-full pl-9 pr-3 py-2 bg-slate-900/60 border border-slate-800 hover:border-slate-700 focus:border-violet-500 focus:ring-1 focus:ring-violet-500 rounded-lg text-xs font-mono text-slate-100 placeholder-slate-600 focus:outline-none transition-all"
                                placeholder="Auto-populated target name">
                        </div>
                    </div>
                </section>

                <!-- Trigger & Action Terminal -->
                <section class="bg-slate-950/65 backdrop-blur-md p-5 rounded-2xl border border-slate-800/80 shadow-xl relative flex flex-col gap-4">
                    <button onclick="triggerForgeProcess()" 
                        class="glowing-button w-full py-3 px-4 rounded-xl bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-500 hover:to-indigo-500 text-white text-xs font-semibold tracking-wider uppercase transition-all duration-300 flex items-center justify-center gap-2 shadow-lg shadow-violet-600/20 active:scale-[0.98]">
                        <span>⚒️</span>
                        <span>Forge API Endpoint</span>
                    </button>

                    <!-- Status Display for general alert messages -->
                    <div id="status" class="hidden rounded-xl border p-3.5 text-xs">
                        <!-- Filled dynamically by uiPresenter -->
                    </div>

                    <!-- Cyberpunk Terminal Window -->
                    <div id="terminal-container" class="hidden rounded-xl border border-slate-800 bg-[#070b13] overflow-hidden flex flex-col shadow-inner">
                        <!-- Terminal Title Bar -->
                        <div class="flex items-center justify-between px-3 py-2 bg-slate-900/80 border-b border-slate-800/60 select-none">
                            <div class="flex items-center gap-1.5">
                                <span class="w-2.5 h-2.5 rounded-full bg-rose-500/80"></span>
                                <span class="w-2.5 h-2.5 rounded-full bg-amber-500/80"></span>
                                <span class="w-2.5 h-2.5 rounded-full bg-emerald-500/80"></span>
                            </div>
                            <span class="text-[9px] font-mono text-slate-500 uppercase tracking-widest">FORGE-SHELL v1.14</span>
                        </div>
                        <!-- Terminal body logs -->
                        <div id="terminal-body" class="p-3.5 space-y-1.5 h-44 overflow-y-auto pr-2 select-text">
                            <!-- Filled dynamically by uiPresenter -->
                        </div>
                    </div>

                    <!-- Final Completion summary card -->
                    <div id="summary" class="hidden rounded-xl border border-slate-800 bg-slate-900/20 p-4 shadow-inner">
                        <!-- Filled dynamically by uiPresenter -->
                    </div>
                </section>
                
            </div>

        </div>

    </div>
</body>
</html>
