<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for modern aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #121214;
        }

        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 9999px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3f3f46;
        }
    </style>
</head>

<body class="bg-[#121214] text-gray-200 min-h-screen pt-3 px-6 pb-6 font-sans select-none">

    <div class="max-w-5xl mx-auto pt-1 pb-2">

        <!-- Header -->
        <div class="mb-2 pb-2 flex items-center justify-between">
            <div class="flex flex-wrap items-baseline gap-x-3">
                <h1
                    class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-400 bg-clip-text text-transparent">
                    Generate Get Actions
                </h1>
                <p class="text-sm text-gray-400 font-medium flex items-center">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 mr-2 animate-pulse"></span>
                    from <code
                        class="px-1.5 py-0.5 rounded bg-gray-800 text-gray-300 border border-gray-700 mx-1 text-xs font-mono">end-points.js</code>
                </p>
            </div>
            <div class="hidden sm:block">
                <div
                    class="p-2.5 rounded-xl bg-gradient-to-br from-blue-500/10 to-indigo-500/10 border border-blue-500/20 text-blue-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                        </path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Folder Name Input Card -->
        <div
            class="mb-8 bg-gradient-to-br from-[#1b1b1c] to-[#141416] p-6 rounded-2xl border border-gray-800/80 shadow-xl relative overflow-hidden group">
            <div
                class="absolute -right-16 -top-16 w-32 h-32 bg-blue-500/5 rounded-full blur-3xl group-hover:bg-blue-500/10 transition-all duration-700">
            </div>
            <label for="folder-name" class="block text-sm font-semibold text-gray-300 mb-2.5 flex items-center">
                <svg class="w-5 h-5 text-blue-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                </svg>
                New Folder Name (Optional)
            </label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-500">
                    <svg class="w-4 h-4 text-gray-500 group-focus-within:text-blue-500 transition-colors" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </div>
                <input type="text" id="folder-name"
                    class="w-full bg-[#0d0d0e] border border-gray-800 rounded-xl pl-10 pr-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500/80 transition-all text-sm font-medium shadow-inner"
                    placeholder="Enter folder name to create and generate into (e.g. showAll)">
            </div>
            <p class="text-xs text-gray-500 mt-2.5 flex items-center">
                <svg class="w-4 h-4 text-gray-500 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                If left blank, it will be created with the action name as the folder name only.
            </p>
        </div>

        <!-- Get Actions Section -->
        <div class="mt-4 grid grid-cols-2 lg:grid-cols-2 gap-8">

            <!-- Direct Actions Column -->
            <div class="border border-gray-800 bg-[#17171a]/50 p-6 rounded-2xl shadow-lg">
                <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-4 flex items-center">
                    <svg class="w-4 h-4 mr-1.5 text-indigo-500/80" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                    Direct Actions
                </h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- showAll -->
                    <button onclick="showAll()"
                        class="group bg-gradient-to-b from-[#1b1b1c] to-[#141416] border border-gray-800/80 rounded-2xl p-5 text-left hover:border-indigo-500/70 hover:shadow-lg hover:shadow-indigo-500/5 hover:-translate-y-0.5 transform transition-all duration-300 relative overflow-hidden focus:outline-none focus:ring-2 focus:ring-indigo-500/30">
                        <div
                            class="absolute inset-0 bg-gradient-to-tr from-indigo-500/0 via-indigo-500/0 to-indigo-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                        </div>
                        <div class="flex flex-col h-full justify-between relative z-10">
                            <div>
                                <div
                                    class="p-2.5 rounded-xl bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 w-fit mb-4 group-hover:scale-110 transition-transform duration-300">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M4 6h16M4 10h16M4 14h16M4 18h16"></path>
                                    </svg>
                                </div>
                                <h3
                                    class="font-bold text-base text-gray-200 group-hover:text-white transition-colors duration-200">
                                    showAll
                                </h3>
                                <p class="text-xs text-gray-400 mt-2 leading-relaxed">
                                    showAll using lowdb
                                </p>
                            </div>
                        </div>
                    </button>

                    <!-- find -->
                    <button onclick="find()"
                        class="group bg-gradient-to-b from-[#1b1b1c] to-[#141416] border border-gray-800/80 rounded-2xl p-5 text-left hover:border-sky-500/70 hover:shadow-lg hover:shadow-sky-500/5 hover:-translate-y-0.5 transform transition-all duration-300 relative overflow-hidden focus:outline-none focus:ring-2 focus:ring-sky-500/30">
                        <div
                            class="absolute inset-0 bg-gradient-to-tr from-sky-500/0 via-sky-500/0 to-sky-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                        </div>
                        <div class="flex flex-col h-full justify-between relative z-10">
                            <div>
                                <div
                                    class="p-2.5 rounded-xl bg-sky-500/10 border border-sky-500/20 text-sky-400 w-fit mb-4 group-hover:scale-110 transition-transform duration-300">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                    </svg>
                                </div>
                                <h3
                                    class="font-bold text-base text-gray-200 group-hover:text-white transition-colors duration-200">
                                    find
                                </h3>
                                <p class="text-xs text-gray-400 mt-2 leading-relaxed">
                                    find using lowdb
                                </p>
                            </div>
                        </div>
                    </button>

                    <!-- FilterQuery -->
                    <button onclick="filterQuery()"
                        class="group bg-gradient-to-b from-[#1b1b1c] to-[#141416] border border-gray-800/80 rounded-2xl p-5 text-left hover:border-emerald-500/70 hover:shadow-lg hover:shadow-emerald-500/5 hover:-translate-y-0.5 transform transition-all duration-300 relative overflow-hidden focus:outline-none focus:ring-2 focus:ring-emerald-500/30">
                        <div
                            class="absolute inset-0 bg-gradient-to-tr from-emerald-500/0 via-emerald-500/0 to-emerald-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                        </div>
                        <div class="flex flex-col h-full justify-between relative z-10">
                            <div>
                                <div
                                    class="p-2.5 rounded-xl bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 w-fit mb-4 group-hover:scale-110 transition-transform duration-300">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 8.293A1 1 0 013 7.586V4z">
                                        </path>
                                    </svg>
                                </div>
                                <h3
                                    class="font-bold text-base text-gray-200 group-hover:text-white transition-colors duration-200">
                                    FilterQuery
                                </h3>
                                <p class="text-xs text-gray-400 mt-2 leading-relaxed">
                                    FilterQuery using lowdb
                                </p>
                            </div>
                        </div>
                    </button>

                    <!-- lastRecord -->
                    <button onclick="lastRecord()"
                        class="group bg-gradient-to-b from-[#1b1b1c] to-[#141416] border border-gray-800/80 rounded-2xl p-5 text-left hover:border-amber-500/70 hover:shadow-lg hover:shadow-amber-500/5 hover:-translate-y-0.5 transform transition-all duration-300 relative overflow-hidden focus:outline-none focus:ring-2 focus:ring-amber-500/30">
                        <div
                            class="absolute inset-0 bg-gradient-to-tr from-amber-500/0 via-amber-500/0 to-amber-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                        </div>
                        <div class="flex flex-col h-full justify-between relative z-10">
                            <div>
                                <div
                                    class="p-2.5 rounded-xl bg-amber-500/10 border border-amber-500/20 text-amber-400 w-fit mb-4 group-hover:scale-110 transition-transform duration-300">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M13 5l7 7-7 7M5 5l7 7-7 7"></path>
                                    </svg>
                                </div>
                                <h3
                                    class="font-bold text-base text-gray-200 group-hover:text-white transition-colors duration-200">
                                    lastRecord
                                </h3>
                                <p class="text-xs text-gray-400 mt-2 leading-relaxed">
                                    lastRecord using lowdb
                                </p>
                            </div>
                        </div>
                    </button>

                    <!-- firstRecord -->
                    <button onclick="firstRecord()"
                        class="group bg-gradient-to-b from-[#1b1b1c] to-[#141416] border border-gray-800/80 rounded-2xl p-5 text-left hover:border-rose-500/70 hover:shadow-lg hover:shadow-rose-500/5 hover:-translate-y-0.5 transform transition-all duration-300 relative overflow-hidden focus:outline-none focus:ring-2 focus:ring-rose-500/30">
                        <div
                            class="absolute inset-0 bg-gradient-to-tr from-rose-500/0 via-rose-500/0 to-rose-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                        </div>
                        <div class="flex flex-col h-full justify-between relative z-10">
                            <div>
                                <div
                                    class="p-2.5 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-400 w-fit mb-4 group-hover:scale-110 transition-transform duration-300">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M11 19l-7-7 7-7M19 19l-7-7 7-7"></path>
                                    </svg>
                                </div>
                                <h3
                                    class="font-bold text-base text-gray-200 group-hover:text-white transition-colors duration-200">
                                    firstRecord
                                </h3>
                                <p class="text-xs text-gray-400 mt-2 leading-relaxed">
                                    firstRecord using lowdb and vanilla js
                                </p>
                            </div>
                        </div>
                    </button>
                </div>
            </div>

            <!-- Aggregate Actions Column -->
            <div class="border border-gray-800 bg-[#17171a]/50 p-6 rounded-2xl shadow-lg">
                <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-4 flex items-center">
                    <svg class="w-4 h-4 mr-1.5 text-pink-500/80" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z">
                        </path>
                    </svg>
                    Aggregate Actions--
                </h2>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- showAll -->
                    <button onclick="distinct()"
                        class="group bg-gradient-to-b from-[#1b1b1c] to-[#141416] border border-gray-800/80 rounded-2xl p-5 text-left hover:border-indigo-500/70 hover:shadow-lg hover:shadow-indigo-500/5 hover:-translate-y-0.5 transform transition-all duration-300 relative overflow-hidden focus:outline-none focus:ring-2 focus:ring-indigo-500/30">
                        <div
                            class="absolute inset-0 bg-gradient-to-tr from-indigo-500/0 via-indigo-500/0 to-indigo-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                        </div>
                        <div class="flex flex-col h-full justify-between relative z-10">
                            <div>
                                <div
                                    class="p-2.5 rounded-xl bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 w-fit mb-4 group-hover:scale-110 transition-transform duration-300">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M4 6h16M4 10h16M4 14h16M4 18h16"></path>
                                    </svg>
                                </div>
                                <h3
                                    class="font-bold text-base text-gray-200 group-hover:text-white transition-colors duration-200">
                                    distinct
                                </h3>
                                <p class="text-xs text-gray-400 mt-2 leading-relaxed">
                                    distinct using lowdb
                                </p>
                            </div>
                        </div>
                    </button>

                    <button onclick="count()"
                        class="group bg-gradient-to-b from-[#1b1b1c] to-[#141416] border border-gray-800/80 rounded-2xl p-5 text-left hover:border-indigo-500/70 hover:shadow-lg hover:shadow-indigo-500/5 hover:-translate-y-0.5 transform transition-all duration-300 relative overflow-hidden focus:outline-none focus:ring-2 focus:ring-indigo-500/30">
                        <div
                            class="absolute inset-0 bg-gradient-to-tr from-indigo-500/0 via-indigo-500/0 to-indigo-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                        </div>
                        <div class="flex flex-col h-full justify-between relative z-10">
                            <div>
                                <div
                                    class="p-2.5 rounded-xl bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 w-fit mb-4 group-hover:scale-110 transition-transform duration-300">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M4 6h16M4 10h16M4 14h16M4 18h16"></path>
                                    </svg>
                                </div>
                                <h3
                                    class="font-bold text-base text-gray-200 group-hover:text-white transition-colors duration-200">
                                    count
                                </h3>
                                <p class="text-xs text-gray-400 mt-2 leading-relaxed">
                                    count using lowdb
                                </p>
                            </div>
                        </div>
                    </button>

                    <!-- find -->
                    <button onclick="min()"
                        class="group bg-gradient-to-b from-[#1b1b1c] to-[#141416] border border-gray-800/80 rounded-2xl p-5 text-left hover:border-sky-500/70 hover:shadow-lg hover:shadow-sky-500/5 hover:-translate-y-0.5 transform transition-all duration-300 relative overflow-hidden focus:outline-none focus:ring-2 focus:ring-sky-500/30">
                        <div
                            class="absolute inset-0 bg-gradient-to-tr from-sky-500/0 via-sky-500/0 to-sky-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                        </div>
                        <div class="flex flex-col h-full justify-between relative z-10">
                            <div>
                                <div
                                    class="p-2.5 rounded-xl bg-sky-500/10 border border-sky-500/20 text-sky-400 w-fit mb-4 group-hover:scale-110 transition-transform duration-300">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                    </svg>
                                </div>
                                <h3
                                    class="font-bold text-base text-gray-200 group-hover:text-white transition-colors duration-200">
                                    min
                                </h3>
                                <p class="text-xs text-gray-400 mt-2 leading-relaxed">
                                    min using lowdb
                                </p>
                            </div>
                        </div>
                    </button>

                    <!-- FilterQuery -->
                    <button onclick="max()"
                        class="group bg-gradient-to-b from-[#1b1b1c] to-[#141416] border border-gray-800/80 rounded-2xl p-5 text-left hover:border-emerald-500/70 hover:shadow-lg hover:shadow-emerald-500/5 hover:-translate-y-0.5 transform transition-all duration-300 relative overflow-hidden focus:outline-none focus:ring-2 focus:ring-emerald-500/30">
                        <div
                            class="absolute inset-0 bg-gradient-to-tr from-emerald-500/0 via-emerald-500/0 to-emerald-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                        </div>
                        <div class="flex flex-col h-full justify-between relative z-10">
                            <div>
                                <div
                                    class="p-2.5 rounded-xl bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 w-fit mb-4 group-hover:scale-110 transition-transform duration-300">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 8.293A1 1 0 013 7.586V4z">
                                        </path>
                                    </svg>
                                </div>
                                <h3
                                    class="font-bold text-base text-gray-200 group-hover:text-white transition-colors duration-200">
                                    max
                                </h3>
                                <p class="text-xs text-gray-400 mt-2 leading-relaxed">
                                    max using lowdb
                                </p>
                            </div>
                        </div>
                    </button>

                </div>
            </div>

        </div>

        <!-- Status -->
        <div id="status"
            class="hidden mt-8 rounded-2xl border border-blue-500/30 bg-blue-950/20 px-5 py-4 text-blue-300 shadow-lg flex items-center space-x-3 animate-pulse">
            <svg class="animate-spin h-5 w-5 text-blue-400 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none"
                viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
            </svg>
            <span class="font-medium text-sm text-blue-200">⏳ Generating CRUD...</span>
        </div>

        <!-- Summary -->
        <div id="summary"
            class="hidden mt-8 rounded-2xl border border-emerald-500/20 bg-emerald-950/20 p-6 shadow-lg text-sm text-gray-300 space-y-2.5 relative overflow-hidden">
            <!-- Content injected dynamically -->
        </div>

    </div>

</body>

</html>
