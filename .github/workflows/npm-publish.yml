name: NPM Publish

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Publish to NPM
        id: npm_publish
        run: |
          npm config set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN }}
          npm publish --access public

      - name: Generate Workflow Summary
        if: always()
        run: |
          echo "## 📊 Publish Execution Summary" >> $GITHUB_STEP_SUMMARY
          
          echo "### 🚀 NPM Publish Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.npm_publish.outcome }}" = "success" ]; then
            echo "- **Status:** Success ✅" >> $GITHUB_STEP_SUMMARY
            echo "- **Package Name:** \`vs-code-ext-from-any-js\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Version:** \`$(node -p "require('./package.json').version")\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Registry Link:** [npmjs.com/package/vs-code-ext-from-any-js](https://www.npmjs.com/package/vs-code-ext-from-any-js)" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.npm_publish.outcome }}" = "failure" ]; then
            echo "- **Status:** Failed ❌" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status:** Skipped ⏭️" >> $GITHUB_STEP_SUMMARY
          fi
